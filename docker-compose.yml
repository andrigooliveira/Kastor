# ────────────────────────────────────────────────────────────────
# Kastor — Stack docker-compose pra Docker Swarm (via Portainer)
#
# ⚠️ IMPORTANTE — este arquivo é pra SWARM em produção.
#
# Regras que o Swarm impõe (respeitadas aqui):
# 1. `build: .` é IGNORADO pelo Swarm — a imagem TEM que vir de um registry.
#    A pipeline em .github/workflows/deploy.yml faz o build e publica no GHCR
#    a cada push na main.
# 2. Com Postgres externo, o app é STATELESS pro banco. Você pode escalar
#    `replicas` a partir de N=2 pra HA horizontal quando quiser — só cuide do
#    volume de uploads (opções abaixo).
#
# Uploads (data/uploads + data/auth.enc):
# - Enquanto rodar com replicas: 1 num nó fixo, o volume nomeado local funciona.
# - Pra escalar horizontalmente, mova pra storage compartilhado (NFS, S3/MinIO
#   com camada intermediária, etc.) ou refatore o server pra guardar uploads no
#   próprio Postgres.
#
# Como usar no Portainer:
#   1. Stacks > Add stack
#   2. Name: kastor
#   3. Build method: Repository → cola URL do GitHub (Portainer clona o repo
#      pra pegar o docker-compose.yml, mas NÃO faz build da imagem — usa a
#      que a Action publicou no GHCR).
#   4. Environment variables: cole as vars listadas em DEPLOY.md
#      (obrigatoriamente DATABASE_URL).
#   5. Deploy the stack.
#
# Variáveis sensíveis (DATABASE_URL, FLUXO_SECRET, SMTP_PASS, GOOGLE_CLIENT_SECRET)
# vêm da aba "Environment variables" do Portainer. NUNCA commite .env.
# ────────────────────────────────────────────────────────────────
version: '3.8'

services:
  kastor:
    # Imagem publicada pelo GitHub Actions no GitHub Container Registry.
    # O tag :latest sempre aponta pro build mais recente da main.
    # Pra congelar em um SHA específico, troque por :abc123def...
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/kastor:latest

    # Bloco `deploy:` só faz sentido em modo Swarm (compose CLI simples ignora).
    deploy:
      replicas: 1  # Suba pra 2+ quando o volume de uploads virar compartilhado.
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first  # Postgres externo permite subir novo antes de derrubar velho.
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
      placement:
        constraints:
          - node.role == manager  # Fixa no nó onde o volume de uploads vive.
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

    ports:
      - "${HOST_PORT:-8080}:3000"

    environment:
      # ── Runtime ─────────────────────────────────────────
      NODE_ENV: production
      PORT: 3000
      # Diretório onde vivem os uploads dos usuários e o auth.enc.
      # Bate com o volume montado abaixo.
      KASTOR_DATA_DIR: /app/data

      # ── Banco de dados (PostgreSQL) ─────────────────────
      # Formato: postgres://user:pass@host:port/dbname[?sslmode=require]
      # Managed (Neon/Supabase/RDS/Railway/Render) → geralmente exige sslmode=require.
      # Self-hosted → pode ser postgres://kastor:senha@postgres.local:5432/kastor
      DATABASE_URL: ${DATABASE_URL:-}

      # ── Segurança ───────────────────────────────────────
      # Chave hex de 64 chars pra criptografar tokens em disco.
      # Gere uma vez com:  openssl rand -hex 32
      # SE NÃO definir, o app gera e salva em data/secret.bin (funciona, mas
      # se trocar o volume perde as sessões).
      FLUXO_SECRET: ${FLUXO_SECRET:-}
      KASTOR_SESSION_DAYS: ${KASTOR_SESSION_DAYS:-30}

      # ── URL pública (pra emails de reset de senha, callbacks OAuth) ─
      PUBLIC_URL: ${PUBLIC_URL:-}

      # ── SMTP (opcional — sem isso "esqueci senha" não envia email) ─
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_FROM: ${SMTP_FROM:-}

      # ── Google Calendar (integração one-way, opcional) ──────────
      # Redirect URI DEVE ser o URL público HTTPS + /api/google/callback
      # e precisa estar cadastrado no Google Cloud Console.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}

    volumes:
      # Volume nomeado — sobrevive a rebuilds/updates. Contém uploads dos
      # usuários e secret.bin (criptografia local do auth). BACKUP DISSO
      # continua importante, mas o CRÍTICO agora é o backup do Postgres.
      # No Swarm, o volume fica no nó fixado pela placement constraint acima.
      - kastor_data:/app/data

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  kastor_data:
    # Driver local — vive no filesystem do nó manager fixado.
    # Pra backup de uploads, ver seção "Backup" no DEPLOY.md.
    # O banco em si (Postgres) tem backup próprio via provedor ou dump.

# ────────────────────────────────────────────────────────────────
# BACKUP / RESTORE
#
# Banco (Postgres) — SEMPRE prioridade #1:
#   pg_dump "$DATABASE_URL" > kastor-$(date +%F).sql
#   psql "$DATABASE_URL" < kastor-YYYY-MM-DD.sql   # restore
# (managed providers como Neon/Supabase têm backup automatizado — confira.)
#
# Uploads (volume kastor_data) — rodar no nó manager onde o volume mora:
#   docker run --rm -v kastor_kastor_data:/data -v $(pwd):/backup \
#     alpine tar czf /backup/kastor-uploads-$(date +%F).tar.gz -C /data .
#
# O nome do volume na prática é <STACK>_kastor_data. Confira com:
#   docker volume ls | grep kastor
# ────────────────────────────────────────────────────────────────
